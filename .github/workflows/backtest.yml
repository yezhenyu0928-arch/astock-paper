name: backtest
# CI 全量库回测(OPTIMIZE_V4.md 四点五节:个股策略本机建不起库,回测统一在 CI 跑)。
# 触发:①手动 workflow_dispatch(可指定 sids);②push 改动根目录 .backtest-trigger 戳文件时。
#   —— 用独立戳文件而非 strategies/ 路径触发,避免每次改策略/回填 reports 都误触发或自触发死循环。
# 架构(2026-07-19 改):prep 单次建库/缓存 → backtest 用 matrix 并行跑各策略(每策略独立 runner,~1h,
#   互不拖累,根治单 job 串行 6 策略 5.5h 撞 timeout-minutes:330 被强杀的问题) → collect 汇总各策略
#   产物 artifact 后统一 commit 回 main。
#
# 2026-07-23 扩池+差异化:
#   * 默认策略集切到 6 个 @v3(主板全市场差异化版: 各取不同市值段+分红门槛 → 操作真正岔开)。
#   * prep 的 "ensure full DB" 现会构建/校验 index_members['mainboard'](~1300只)及其日线/基本面,
#     主板池不足即内联 backfill.py 全量重建(backfill.py 现默认构建 mainboard 流动性池)。
#   * 缓存 key 改为 run 内唯一 db-${{ github.run_id }}(prep 存 / matrix 取),
#     避免旧稳定键 db-stable-v3 被冻结、matrix 取到陈旧库导致 @v3 回退到 sh000300。
on:
  workflow_dispatch:
    inputs:
      sids:
        description: "回测策略(逗号分隔;留空=下列默认新策略集)"
        required: false
        default: "s1_dividend@v3,s4_smallcap@v3,s8_checklist@v3,s13_growth_quality_rotation@v3,s14_value_reversal_rotation@v3,s15_core_allocation@v3"
  push:
    paths:
      - '.backtest-trigger'
      - '.github/workflows/backtest.yml'

permissions:
  contents: write

jobs:
  # ---------- ① 建库/缓存 + 解析策略集(单次,供并行 matrix 复用) ----------
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt

      - name: restore DB cache (seed for incremental, best-effort)
        uses: actions/cache/restore@v4
        with:
          path: db/market.sqlite
          key: db-stable-v3
          restore-keys: |
            db-

      - name: ensure full DB (主板池/沪深300/年报库不足则重建)
        run: |
          read covered annual_codes mb_cov <<< $(python - <<'PY'
          import sqlite3, os
          n, an, mb = 0, 0, 0
          if os.path.exists("db/market.sqlite"):
              try:
                  c = sqlite3.connect("db/market.sqlite")
                  members = [r[0] for r in c.execute(
                      "SELECT code FROM index_members WHERE index_code='sh000300'")]
                  try:
                      mb_members = [r[0] for r in c.execute(
                          "SELECT code FROM index_members WHERE index_code='mainboard'")]
                  except Exception:
                      mb_members = []
                  cnt = {code: k for code, k in c.execute(
                      "SELECT code, COUNT(1) FROM daily_bar GROUP BY code")}
                  n = sum(1 for m in members if cnt.get(m, 0) >= 500)
                  mb = sum(1 for m in mb_members if cnt.get(m, 0) >= 500)
                  try:
                      an = c.execute("SELECT COUNT(DISTINCT code) FROM stock_annual").fetchone()[0]
                  except Exception:
                      an = 0
                  c.close()
              except Exception:
                  n, an, mb = 0, 0, 0
          print(n, an, mb)
          PY
          )
          echo "沪深300日线≥500: $covered 只; 主板日线≥500: $mb_cov 只; stock_annual: $annual_codes 只"
          # 主板流动性池(~1300只)不足 → 全量重建(backfill.py 现默认构建 mainboard + 日线 + 基本面)
          if [ "$mb_cov" -lt 800 ] || [ "$covered" -lt 250 ]; then
            echo "主板/沪深300库不足(mb=$mb_cov, sh300=$covered),内联 backfill 全量重建..."
            python -c "import data,conf; data.update_all(conf.load_config(), conf.load_registry(), with_members=True)"
            python backfill.py
          fi
          if [ "$annual_codes" -lt 250 ]; then
            echo "年报ROE库不足($annual_codes<250),针对性补年报ROE(不重做日线)..."
            python -c "
          import conf, fundamental
          from db import get_conn
          conn = get_conn()
          codes = sorted(set(r[0] for r in conn.execute(
              \"SELECT code FROM index_members WHERE index_code='sh000300'\")))
          fundamental.update_annual_roe(codes, conn=conn, start_year=2015)
          n = conn.execute('SELECT COUNT(DISTINCT code) FROM stock_annual').fetchone()[0]
          print(f'补数后 stock_annual 覆盖: {n} 只code')
          conn.close()
          "
          fi
          if [ "$mb_cov" -ge 800 ] && [ "$covered" -ge 250 ] && [ "$annual_codes" -ge 250 ]; then
            echo "主板/沪深300/年报库均充分,跳过 backfill"
          fi

      - name: macro indicators backfill (PMI/社融/北向/融资余额)
        run: |
          python -c "import macro_data; print('macro backfill:', macro_data.backfill())" || echo "::warning::macro backfill 失败(回测将降级为价格类指标)"

      - name: save DB cache (run 内唯一键, 供 matrix 复用)
        uses: actions/cache/save@v4
        with:
          path: db/market.sqlite
          key: db-${{ github.run_id }}

      - name: 解析策略集为 JSON 矩阵
        id: set
        run: |
          SIDS="${{ github.event.inputs.sids }}"
          if [ -z "$SIDS" ]; then
            SIDS="s1_dividend@v3,s4_smallcap@v3,s8_checklist@v3,s13_growth_quality_rotation@v3,s14_value_reversal_rotation@v3,s15_core_allocation@v3"
          fi
          JSON=$(python -c "import json,sys; print(json.dumps([s.strip() for s in sys.argv[1].split(',') if s.strip()]))" "$SIDS")
          echo "策略矩阵: $JSON"
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  # ---------- ② 并行回测:每个策略一个独立 runner ----------
  backtest:
    needs: prep
    runs-on: ubuntu-latest
    timeout-minutes: 180        # 单策略五关+蒙卡通常~1h,180min 充足余量
    strategy:
      fail-fast: false          # 某策略失败不连累其它策略
      matrix:
        sid: ${{ fromJSON(needs.prep.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt

      - name: restore DB cache (复用 prep 已建库)
        uses: actions/cache/restore@v4
        with:
          path: db/market.sqlite
          key: db-${{ github.run_id }}

      - name: 五关回测 + 蒙特卡洛 (${{ matrix.sid }})
        run: |
          sid="${{ matrix.sid }}"
          echo "===== 五关回测 $sid ====="
          python backtest.py report "$sid" || echo "::warning::report $sid 失败"
          echo "===== 蒙特卡洛 validate $sid ====="
          python validate.py "$sid" || echo "::warning::validate $sid 失败"

      - name: 收集本策略新生成/变更的报告
        run: |
          mkdir -p out
          # porcelain: 前3列为状态,路径从第4列起;兼容 M(改动) 与 ??(新建)
          git status --porcelain reports/ | cut -c4- | while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "out/$(dirname "$f")"
            cp "$f" "out/$f"
          done
          echo "本策略产物:" && (ls -R out/reports 2>/dev/null || echo "(无变更文件)")

      - name: 上传报告 artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ strategy.job-index }}
          path: out/reports
          if-no-files-found: warn
          retention-days: 3

  # ---------- ③ 汇总各策略产物,统一 commit 回 main ----------
  collect:
    needs: backtest
    if: always()               # 即使个别策略失败也把已成功的报告提交回来
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 下载全部策略报告
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          merge-multiple: true
          path: dl

      - name: 合并进 reports/
        run: |
          if [ -d dl ]; then
            cp -rv dl/. reports/ 2>/dev/null || true
          fi
          echo "=== reports/ 目录 ===" && ls -la reports/ | head -40

      - name: commit reports
        run: |
          git config user.name "astock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/ || true
          git commit -m "backtest reports $(date -u +%F) [ci]" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase --autostash || true
            if git push; then echo "pushed"; break; fi
            echo "push 第 $i 次失败,重试..."; sleep 5
          done
