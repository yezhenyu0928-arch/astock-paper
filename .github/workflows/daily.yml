name: daily
on:
  schedule:
    - cron: '40 9 * * 1-5'    # UTC09:40 = 北京17:40 主触发
    - cron: '10 10 * * 1-5'   # 北京18:10 补跑(run_daily 幂等,重复安全)
  workflow_dispatch:
    inputs:
      force_rebalance:
        description: '强制调仓日(绕过月频,用于验证选股/修复是否生效)'
        type: boolean
        default: false
      no_push:
        description: '不推送微信(仅验证日志,默认false)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      # DB 用 cache 持久化(避免把大二进制提交进 git 造成仓库膨胀)。
      # key 每次唯一以强制保存新版,restore-keys 前缀取回最近一次。
      - name: restore DB cache
        uses: actions/cache@v4
        with:
          path: db/market.sqlite
          key: db-${{ github.run_id }}
          restore-keys: db-
      - name: run pipeline
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          AGNES_LLM_KEY: ${{ secrets.AGNES_LLM_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FORCE_REBALANCE: ${{ github.event.inputs.force_rebalance }}
          NO_PUSH: ${{ github.event.inputs.no_push }}
        run: python run_daily.py
      - name: bundle Chart.js locally (no CDN dependency)
        # CI 有外网:把 Chart.js 抓到 docs/vendor/,使 Pages 自带该文件,不再依赖用户浏览器访问境外 CDN。
        run: |
          mkdir -p docs/vendor
          for url in \
            "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" \
            "https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.7/chart.umd.min.js" \
            "https://unpkg.com/chart.js@4.4.7/dist/chart.umd.min.js" ; do
            if curl -fsSL --max-time 30 -o docs/vendor/chart.umd.min.js "$url"; then
              echo "Chart.js fetched from $url"; break
            fi
          done
          if [ -s docs/vendor/chart.umd.min.js ]; then
            echo "vendor size: $(wc -c < docs/vendor/chart.umd.min.js) bytes"
          else
            echo "::warning::Chart.js 下载失败,看板图表将回退为空白(页面其余正常)"
          fi
      - name: alert on failure
        if: failure()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
        run: python notify.py --alert "🔴 今日Actions任务失败,系统未正常运行,请暂停跟单并检查" || true
      # 只提交文本快照(state/reports/docs),不提交 DB。docs/ 供 GitHub Pages。
      # 卡B:push 失败不再静默吞错——最多重试3次(每次先 rebase),仍失败则告警(Pages 会停更)。
      - name: commit snapshot
        run: |
          git config user.name "astock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ reports/ docs/ || true
          git commit -m "snapshot $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          pushed=0
          for i in 1 2 3; do
            git pull --rebase --autostash || true
            if git push; then pushed=1; break; fi
            echo "push 第 $i 次失败,重试..."; sleep 5
          done
          if [ "$pushed" != "1" ]; then
            echo "::error::snapshot push 三次均失败"
            python notify.py --alert "🔴 看板快照推送失败(git push 三次均失败),GitHub Pages 未更新,请检查仓库权限/冲突" || true
            exit 1
          fi
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
