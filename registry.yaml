# 策略版本注册档案 —— 只增不改。改参数 = 注册新版本(如 s2_etf@v2)从零起跑。
# 赛马公平性的根:净值曲线永不因中途调参而混接。

s2_etf@v1:
  class: strategies.s2_etf.S2EtfMomentum
  benchmark: sh510300
  frozen_date: 2026-07-03       # M3 验证完成,版本锁定入赛(五关报告见 reports/s2_etf_at_v1.md)
  params:
    momentum_windows: [20, 60] # 双窗口收益率排名取均值
    hold_n: 1                  # 持有最强 n 只
    rebalance: weekly          # 每周最后一个交易日
    safe_asset: sh511010       # 绝对动量<0时切换的国债ETF
  universe: [sh510300, sh510500, sh512890, sh518880, sh513100, sh511010]
  # 沪深300 / 中证500 / 红利低波 / 黄金 / 纳指(QDII,T+0) / 国债

s1_dividend@v1:
  class: strategies.s1_dividend.S1DividendLowVol
  benchmark: sh510300          # 沪深300ETF(数据可行:原中证红利未入库;池已用沪深300)
  frozen_date: 2026-07-03       # 版本锁定入赛(报告见 reports/)
  params:
    min_dividend_yield: 0.04   # 股息率下限
    dividend_years: 3          # 连续分红年数
    low_vol_pct: 0.30          # 波动率位于池内后30%
    hold_n: 10                 # 等权持有
  universe: dynamic            # 全A过滤,generate_orders 内实现
  rebalance: monthly

s1_dividend@v2:
  class: strategies.s1_dividend.S1DividendQuality
  benchmark: sh510300          # 沪深300ETF(数据可行;池已用沪深300)
  frozen_date: 2026-07-06       # 卡D 注册入赛(v1 并行不受影响);ROE数据覆盖率98.8%,过门槛
  params:
    min_dividend_yield: 0.04   # 股息率下限
    dividend_years: 3          # 连续分红年数
    low_vol_pct: 0.30          # 波动率位于池内后30%
    roe_years: 3               # 连续3年ROE门槛
    roe_min: 0.08              # 每年ROE>8%(小数)且净利润>0
    weights: {dividend: 0.4, low_vol: 0.3, roe: 0.3}   # 三因子排名打分权重
    hold_n: 10                 # 等权持有
  universe: dynamic            # 沪深300过滤,generate_orders 内实现
  rebalance: monthly

s3_ma_trend@v1:
  class: strategies.s3_ma_trend.S3MaTrend
  benchmark: sh510300
  frozen_date: 2026-07-03       # 版本锁定入赛(报告见 reports/)
  params:
    fast: 20                   # 20日均线上穿
    slow: 60                   # 60日均线
    vol_mult: 1.5              # 突破日成交量 > 20日均量×1.5
    max_holdings: 10           # 单票权重=1/10
  universe: index:sh000300     # 沪深300成分(历史快照)
  rebalance: daily

s4_smallcap@v1:
  class: strategies.s4_smallcap.S4SmallCapFactor
  benchmark: sh510300          # 沪深300ETF(数据可行:原中证2000未入库;池已用沪深300)
  frozen_date: 2026-07-03       # 版本锁定入赛(报告见 reports/)
  params:
    pool_size: 400             # 过滤后市值最小400只
    weights: {size: 0.5, pb: 0.3, momentum_20d: 0.2}   # 打分权重
    hold_n: 20
  universe: dynamic
  rebalance: monthly

s5_grid@v1:
  class: strategies.s5_grid.S5IndexGrid
  benchmark: sh510300
  frozen_date: 2026-07-03       # 版本锁定入赛(报告见 reports/)
  params:
    pe_low: 0.30               # 沪深300 PE十年分位<30%区间分批买
    pe_high: 0.70              # >70%区间分批卖
    grid_step: 0.02            # 中间区间2%网格
    tranches: 5                # 分5档建/减仓
  universe: [sh510300]
  rebalance: daily

s6_sector@v1:
  class: strategies.s6_sector.S6SectorMomentum
  benchmark: sh510300
  frozen_date: 2026-07-06       # 卡C 注册入赛(从注册日起跑,不追溯);五关报告见 reports/
  params:
    # 实现期微调(蓝图原 weekly[20,60]):weekly+短窗在2022-25震荡市严重whipsaw(全期-11.8%),
    # 改 monthly[60,120](贴近西部证券行业动量研究方法),全期+36.6%/样本外+82.3% Calmar0.99。详见报告。
    momentum_windows: [60, 120] # 双窗口收益率排名均值(3月/6月动量)
    vol_window: 60             # 60日波动率(低波因子)
    weights: {momentum: 0.8, low_vol: 0.2}   # 综合评分权重
    hold_n: 1                  # 持有综合最强 1 只
    rebalance: monthly         # 每月最后交易日(降低换手/摩擦)
    safe_asset: sh511010       # 绝对动量<0时切换的国债ETF
  # 行业ETF池:券商/半导体/医药/消费/军工/新能源/酒/光伏/银行 + 国债(避险)。
  # 均上市≥3年、规模>20亿、日均成交>1亿(2021年后上市的新能源/酒/光伏在早期回测段数据不足会自动跳过)。
  universe: [sh512000, sh512480, sh512010, sz159928, sh512660, sh516160,
             sh512690, sh515790, sh512800, sh511010]

s1_dividend@v3:
  class: strategies.s1_dividend_v3.S1DividendV3
  benchmark: sh510300
  frozen_date: 2026-07-05       # 卡J 注册入赛(v1/v2 并行不受影响);Barra因子增强版
  params:
    min_dividend_yield: 0.04
    dividend_years: 3
    roe_years: 3
    roe_min: 0.08
    factor_weights: {VALUE: 0.4, QUALITY: 0.3, LOW_VOL: 0.2, SIZE: 0.1}
    hold_n: 10
    max_per_industry: 2
  universe: dynamic
  rebalance: monthly

s4_smallcap@v2:
  class: strategies.s4_smallcap_v2.S4SmallcapV2
  benchmark: sh510300
  frozen_date: 2026-07-05       # 卡J 注册入赛(v1 并行不受影响);Barra多因子价值增强版
  params:
    factor_weights: {SIZE: 0.3, MOMENTUM: 0.3, VALUE: 0.2, LIQUIDITY: 0.2}
    resvol_cap_z: 1.28
    max_per_industry: 3
    hold_n: 20
  universe: dynamic
  rebalance: monthly
