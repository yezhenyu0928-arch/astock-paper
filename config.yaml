# 工作配置(由 config.example.yaml 复制)。普通用户只需改 capital 和 smtp.user 两处。
# 秘钥不写在这里!放 GitHub Secrets,运行时由环境变量注入:
#   PUSHPLUS_TOKEN / SMTP_AUTH_CODE / DASHBOARD_PASSWORD / ANTHROPIC_API_KEY

user:
  capital: 50000            # 模拟建账规模(非真投额;5万档5策略均可交易赛马)。回测/持仓数按此
  smtp:
    host: smtp.qq.com
    port: 465
    user: 1330262571@qq.com       # ←改成你的邮箱(推送失败时的备用通知)

costs:
  commission_rate: 0.00025  # 佣金万2.5
  commission_min: 5         # 最低5元
  stamp_tax_sell: 0.0005    # 卖出印花税(现行1‰?以现行税率核对;此处按0.5‰保守写,可调)
  slippage:
    etf: 0.0005
    stock: 0.0015

risk:
  strategy_max_drawdown: 0.15   # 策略熔断线
  stop_loss:
    trend: 0.08                 # s3 等趋势类个股止损
    rotation: 0.12              # s1/s4 等轮动类
  max_position_pct: 0.15        # 单票占账户上限
  market_freeze:
    day_drop: 0.03              # 沪深300单日跌幅
    m20_drop: 0.10              # 20日累计跌幅
  min_avg_amount: 50000000      # 个股20日日均成交额下限(元)

strategies:                     # 精选阵容(2026-07 优化):删负收益、归档重复变体、新增赛道旗舰
  s2_etf@v1: true               # ETF动量轮动(全期年化~9%)
  s1_dividend@v2: true          # 红利低波·质量增强(年化~12%,取代 v1/v3)
  s4_smallcap@v1: true          # 小市值多因子(年化~25%,最强)
  s6_sector@v1: true            # 行业ETF动量(年化~7.5%,政策/行业面代理)
  s7_track@v1: true             # 赛道旗舰:GLM政策+行业动量+市场regime,集中1-2赛道
  s2_etf@v2: false              # V4卡N已裁决:回测年化3.2%/回撤20%/Calmar0.16,弱于v1(9%/25%/0.36),动量防护误伤收益不上线(registry保留备查)
  # ↓ 已下线(2026-07 优化):负收益或与保留版本重复,曲线归档、不再参与赛马
  s3_ma_trend@v1: false         # 删:全期年化 -0.2%(双均线趋势在震荡市持续 whipsaw)
  s5_grid@v1: false             # 删:全期年化 -3.3%(PE网格全期负收益)
  s1_dividend@v1: false         # 归档:被 v2 质量增强版取代(v2 年化12% > v1 11%)
  s1_dividend@v3: false         # 归档:与 v2 高度重复,Barra 增强边际提升有限
  s4_smallcap@v2: false         # 归档:被 v1 取代(v1 年化25% > v2)

schedule:
  signal_push_time: "18:00"     # 北京时间,仅用于消息标题展示

news_layer:                   # 消息面层:风险过滤 + 产业逻辑驱动
  enabled: true
  llm: true                   # 启用 LLM 语义分析
  llm_provider: glm           # glm / anthropic / mimo
  llm_base_url: https://open.bigmodel.cn/api/paas/v4
  llm_api_key_env: GLM_API_KEY   # GitHub Secrets 中的环境变量名(值放 Secrets,勿写库)
  llm_model: glm-4.7-flash      # 智谱 GLM-4.7-Flash(免费)
  llm_shadow: false           # 影子评估档(记录但不干预)
  intraday_scan: true         # 盘中10:00/13:30/14:45三次黑天鹅扫描
  industry_boost_weight: 0.2  # 产业信号在S6中的权重(0.2=20%)
  exposure_map: {-2: 0.0, -1: 0.5, 0: 1.0, 1: 1.1, 2: 1.2}  # 利好也能加仓(+10%/+20%)

custom:                        # 小资金适配与个性化(SPEC_FILL.md)
  min_order_amount: 5000       # 单笔最低金额(最低佣金5元的成本保护)
  min_ticket: 8000             # 单票最低配置额,决定持仓数随资金自适应
  open_frac: {stock: 0.08, etf: 0.10}   # 开盘时段成交额占比(成交概率模型)
  impact_k: {stock: 0.0020, etf: 0.0008} # 冲击成本系数
  hold_n_override: {}          # 手动锁定某策略持仓数,如 {s1_dividend@v1: 5}
  exclude_star_chinext: true   # true=不买科创板(688)/创业板(300/301)。未开通这些权限就设true
  universe_exclude: []         # 你不想碰的代码黑名单(具体代码,如 [sz300750])
  s2_universe_extra: []        # 追加ETF即注册s2@v2新赛道,旧曲线归档
  push_times_intraday: ["10:00","13:30","14:45"]
  risk_override: {}            # 只允许比默认更严,放松将被拒绝加载
